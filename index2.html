<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Test Ultime</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; } 

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1a1a2e;
            color: #e94560;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            position: relative; 
            transition: background-color 0.3s;
        }

        /* --- SYSTÈME DE SCORE --- */
        #score-container {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white; 
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid white;
            transition: all 0.2s;
        }

        .score-baisse {
            color: #ff0000 !important;
            border-color: #ff0000 !important;
            animation: secousse-score 0.3s ease-in-out;
        }

        .score-hausse {
            color: #4CAF50 !important;
            border-color: #4CAF50 !important;
            transform: scale(1.1);
        }

        @keyframes secousse-score {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) scale(1.1); }
            50% { transform: translateX(5px) scale(1.1); }
            75% { transform: translateX(-5px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }

        /* ---------------------------------- */

        .ecran {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 90%; 
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10; 
        }

        #ecran-jeu { display: flex; }
        #ecran-message { display: none; gap: 30px; }

        h1 { font-size: 1.6rem; text-transform: uppercase; margin-bottom: 20px; transition: filter 0.3s ease;}
        #texte-troll { margin-bottom: 0; } 

        .zone-boutons { display: flex; flex-direction: column; width: 100%; }

        button {
            font-size: 1.1rem;
            padding: 16px;
            margin: 8px 0;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease; 
            position: relative; 
            z-index: 20; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        .btn-choix { background-color: #16213e; color: white; border: 2px solid #0f3460; }
        .btn-continuer { background-color: #e94560; color: white; margin: 0; }
        .btn-rejouer { background-color: #4CAF50; color: white; margin-top: 20px; border: 2px solid #388E3C; }

        #ecran-virus, #ecran-crash { display: none; }

        /* --- ANIMATIONS --- */
        @keyframes tremblement-ecran {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-15px, 0px); }
            40% { transform: translate(10px, -10px); }
            60% { transform: translate(-15px, 1px); }
            100% { transform: translate(0px, 0px); }
        }
        .effet-tremble { animation: tremblement-ecran 0.4s ease-in-out; }

        .brise-1 { background: linear-gradient(135deg, transparent 48%, rgba(255, 255, 255, 0.6) 49%, transparent 52%), #16213e; }
        .brise-2 { background: linear-gradient(135deg, transparent 48%, rgba(255, 255, 255, 0.7) 49%, transparent 52%), linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.7) 31%, transparent 34%), #16213e; }

        .pendu {
            transform-origin: top left !important; 
            animation: balance-panneau 1.5s ease-in-out forwards;
        }

        @keyframes balance-panneau {
            0% { transform: rotate(0deg); }
            20% { transform: rotate(80deg); }
            40% { transform: rotate(40deg); }
            60% { transform: rotate(70deg); }
            80% { transform: rotate(55deg); }
            100% { transform: rotate(65deg); } 
        }

        .tombe { 
            transform-origin: top left !important;
            opacity: 0 !important; 
            pointer-events: none !important; 
            transition: all 1s ease-in !important; 
        }

        /* --- TERMINAL --- */
        #ecran-crash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; color: #0f0; z-index: 10000;
            display: none; flex-direction: column; justify-content: flex-start;
            padding: 30px 15px; text-align: left; font-family: 'Courier New', Courier, monospace;
        }
        #terminal-text { white-space: pre-wrap; margin-bottom: 20px; font-size: 1rem; line-height: 1.5; }
        .terminal-btns { display: none; flex-direction: column; width: 100%; }
        .terminal-btns button { border: 2px solid #0f0; background: transparent; color: #0f0; text-transform: uppercase; margin-top: 15px; }

        /* --- VIRUS --- */
        #ecran-virus {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: red; color: white; z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        #ecran-virus p { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="score-container">Score : <span id="score-val">0</span></div>

    <div id="ecran-jeu" class="ecran">
        <h1 id="texte-question">Chargement...</h1>
        <div id="zone-boutons" class="zone-boutons"></div>
    </div>

    <div id="ecran-message" class="ecran">
        <h1 id="texte-troll">Message troll</h1>
        <button class="btn-continuer" onclick="fermerMessage()">J'ai compris...</button>
    </div>

    <div id="ecran-virus">
        <h1 style="animation: blink 0.5s infinite">⚠️ ERROR ⚠️</h1>
        <p>ERREUR CRITIQUE DÉTECTÉE</p>
        <button class="btn-choix" style="border-color: white;" onclick="cacherVirus()">RETOUR AU JEU</button>
    </div>

    <div id="ecran-crash">
        <div id="terminal-text"></div>
        <div id="terminal-btns" class="terminal-btns">
            <button id="term-btn-oui" onclick="terminalChoix('OUI')">OUI</button>
            <button id="term-btn-non" onclick="terminalChoix('NN')">NN</button>
        </div>
    </div>

    <script>
        const questions = [
            { question: "L'ananas sur la pizza, c'est bon ?", reponses: ["Oui !", "Beurk, non !"], bonneReponse: 1, effet: "classique", msgs: ["T'es sûr ?", "Réfléchis bien...", "C'est ton dernier mot ?"] },
            { question: "Qui est le plus intelligent ?", reponses: ["L'I.A.", "L'humain"], bonneReponse: 0, effet: "tremblement" },
            { question: "Chocolatine ou Pain au chocolat ?", reponses: ["Chocolatine", "Pain au chocolat"], bonneReponse: 1, effet: "fuite" },
            { question: "Aimes-tu ce jeu ?", reponses: ["Oui !", "Non."], bonneReponse: 0, effet: "grossit" },
            { question: "Céréales : Avant ou Après le lait ?", reponses: ["Avant", "Après"], bonneReponse: 0, effet: "inversion" },
            { question: "TikTok ou Livre ?", reponses: ["TikTok", "Livre"], bonneReponse: 1, effet: "clone" },
            { question: "Qui a toujours raison ?", reponses: ["Le Client", "Le Développeur"], bonneReponse: 1, effet: "flou" },
            { question: "Quel âge as-tu ?", reponses: ["8 ans", "30 ans"], bonneReponse: 0, effet: "gravite" },
            { question: "Veux-tu abandonner ?", reponses: ["Oui", "Non"], bonneReponse: 1, effet: "virus" },
            { question: "Qui est le maître ici ?", reponses: ["Le Joueur", "Le Développeur"], bonneReponse: 1, effet: "crash" }
        ];

        let indexQuestionActuelle = 0;
        let compteurTroll = 0;
        let compteurFuite = 0; 
        let derniereFuite = 0; 
        let derniereInversion = 0; 
        let derniereGravite = 0; 
        let scoreTotal = 0;

        function modifierScore(valeur) {
            scoreTotal += valeur;
            let scoreEl = document.getElementById("score-val");
            let cont = document.getElementById("score-container");
            
            scoreEl.innerText = scoreTotal;
            
            cont.classList.remove("score-baisse", "score-hausse");
            void cont.offsetWidth; 

            if (valeur < 0) {
                cont.classList.add("score-baisse");
                setTimeout(() => cont.classList.remove("score-baisse"), 300);
            } else if (valeur > 0) {
                cont.classList.add("score-hausse");
                setTimeout(() => cont.classList.remove("score-hausse"), 300);
            }
        }

        function chargerQuestion() {
            compteurTroll = 0;
            compteurFuite = 0; 
            derniereFuite = 0;
            derniereInversion = 0;
            derniereGravite = 0;
            
            document.querySelectorAll('.clone-troll').forEach(e => e.remove());
            document.body.style.filter = "none";
            
            let ecranJeu = document.getElementById("ecran-jeu");
            ecranJeu.style.zIndex = "10"; 
            document.getElementById("texte-question").style.filter = "none";
            
            let q = questions[indexQuestionActuelle];
            document.getElementById("texte-question").innerText = q.question;
            let zone = document.getElementById("zone-boutons");
            zone.innerHTML = "";

            q.reponses.forEach((texte, i) => {
                let btn = document.createElement("button");
                btn.className = "btn-choix";
                btn.innerText = texte;
                btn.id = "btn-" + i;
                
                if (q.effet === "fuite" && i !== q.bonneReponse) {
                    btn.onclick = (e) => {
                        e.preventDefault(); 
                        let maintenant = Date.now();
                        if (maintenant - derniereFuite < 250) return; 
                        derniereFuite = maintenant;
                        
                        modifierScore(-2); 
                        compteurFuite++;
                        let bonBtn = document.getElementById("btn-" + q.bonneReponse);
                        
                        if (btn.style.position !== "absolute") {
                            btn.style.width = btn.offsetWidth + "px";
                            btn.style.position = "absolute";
                            btn.style.margin = "0";
                        }

                        let rectEcran = ecranJeu.getBoundingClientRect();

                        if (compteurFuite <= 3) {
                            let screenX = Math.max(10, Math.random() * (window.innerWidth - btn.offsetWidth - 20));
                            let screenY = Math.max(10, Math.random() * (window.innerHeight - btn.offsetHeight - 20));
                            btn.style.left = (screenX - rectEcran.left) + "px";
                            btn.style.top = (screenY - rectEcran.top) + "px";
                            btn.style.zIndex = 100; 
                        } 
                        else if (compteurFuite === 4) {
                            bonBtn.style.zIndex = 50; 
                            btn.style.zIndex = 10; 
                            let rectBon = bonBtn.getBoundingClientRect();
                            let bonRelX = rectBon.left - rectEcran.left;
                            let bonRelY = rectBon.top - rectEcran.top;
                            btn.style.left = (bonRelX + 40) + "px"; 
                            btn.style.top = bonRelY + "px"; 
                        } 
                        else {
                            bonBtn.style.zIndex = 50;
                            btn.style.zIndex = 10;
                            let rectBon = bonBtn.getBoundingClientRect();
                            let bonRelX = rectBon.left - rectEcran.left;
                            let bonRelY = rectBon.top - rectEcran.top;
                            btn.style.left = (bonRelX + 5) + "px";
                            btn.style.top = (bonRelY + 5) + "px";
                            btn.style.pointerEvents = "none";
                        }
                    };
                } 
                else if (q.effet === "inversion") {
                    btn.onclick = (e) => {
                        if (e) e.preventDefault();
                        let maintenant = Date.now();
                        
                        if (maintenant - derniereInversion < 1000) return;

                        // Si le bouton affiche la MAUVAISE réponse (on regarde le texte, pas sa position)
                        if (btn.innerText !== q.reponses[q.bonneReponse]) {
                            modifierScore(-5); 
                            derniereInversion = maintenant;
                            let btn0 = document.getElementById("btn-0");
                            let btn1 = document.getElementById("btn-1");
                            let texteTemp = btn0.innerText;
                            btn0.innerText = btn1.innerText;
                            btn1.innerText = texteTemp;
                        } 
                        else {
                            // Sinon, ça veut dire qu'il a bien cliqué sur le texte "Avant", on valide !
                            verifier(i);
                        }
                    };
                }
                else {
                    btn.onclick = () => verifier(i);
                }
                
                zone.appendChild(btn);
            });
        }

        function verifier(choix) {
            let q = questions[indexQuestionActuelle];
            let btnClique = document.getElementById("btn-" + choix);
            
            // On vérifie de manière infaillible si le TEXTE du bouton cliqué est bien la bonne réponse
            if (btnClique.innerText === q.reponses[q.bonneReponse]) {
                modifierScore(100); 
                indexQuestionActuelle++;
                if (indexQuestionActuelle < questions.length) chargerQuestion();
                else victoire();
            } else {
                modifierScore(-10); 
                compteurTroll++;
                appliquerEffet(q, choix);
            }
        }

        function appliquerEffet(q, choix) {
            let btn = document.getElementById("btn-" + choix);
            let bon = document.getElementById("btn-" + q.bonneReponse);

            if (q.effet === "classique") {
                if (compteurTroll > q.msgs.length) btn.style.display = "none";
                let m = q.msgs[compteurTroll-1] || "Choisis l'autre bouton !";
                afficherMessage(m);
            } 
            else if (q.effet === "tremblement") {
                document.body.classList.remove("effet-tremble");
                void document.body.offsetWidth; 
                document.body.classList.add("effet-tremble");

                if (compteurTroll === 1) btn.classList.add("brise-1");
                else if (compteurTroll === 2) btn.classList.replace("brise-1", "brise-2");
                else btn.style.display = "none";
            } 
            else if (q.effet === "grossit") {
                bon.style.zIndex = "100"; 
                btn.style.zIndex = "1";   
                bon.style.transform = `scale(${1 + (compteurTroll * 0.4)})`;
                btn.style.transform = `scale(${Math.max(0.1, 1 - (compteurTroll * 0.2))})`;
            } 
            else if (q.effet === "clone") {
                document.getElementById("ecran-jeu").style.zIndex = "500";
                bon.style.zIndex = "1000"; 
                
                let cl = document.createElement("button");
                cl.className = "btn-choix clone-troll";
                cl.innerText = btn.innerText; 
                cl.style.position = "fixed";
                cl.style.width = btn.offsetWidth + "px";
                cl.style.zIndex = "1"; 
                
                let x = Math.max(10, Math.random() * (window.innerWidth - btn.offsetWidth - 20));
                let y = Math.max(10, Math.random() * (window.innerHeight - btn.offsetHeight - 20));
                cl.style.left = x + "px";
                cl.style.top = y + "px";
                cl.onclick = () => verifier(choix); 
                document.body.appendChild(cl);
            } 
            else if (q.effet === "flou") {
                document.getElementById("texte-question").style.filter = `blur(${compteurTroll * 3}px)`;
                btn.style.filter = `blur(${compteurTroll * 3}px)`;
                bon.style.zIndex = "100";
                bon.style.boxShadow = "0 0 20px white";
            } 
            else if (q.effet === "gravite") {
                let maintenant = Date.now();
                if (maintenant - derniereGravite < 500) return; 
                derniereGravite = maintenant;

                if (compteurTroll === 1) {
                    btn.classList.add("pendu");
                } else {
                    let matriceActuelle = window.getComputedStyle(btn).transform;
                    btn.style.transform = matriceActuelle;
                    btn.classList.remove("pendu");
                    void btn.offsetWidth;
                    btn.classList.add("tombe");
                    btn.style.transform = `translateY(100vh) rotate(${120 + Math.random() * 90}deg)`;
                }
            } 
            else if (q.effet === "virus") {
                document.getElementById("ecran-virus").style.display = "flex";
            } 
            else if (q.effet === "crash") {
                lancerTerminal();
            }
        }

        let terminalEcrit = false; 

        function lancerTerminal() {
            document.getElementById("ecran-jeu").style.display = "none";
            document.getElementById("score-container").style.display = "none"; 
            document.getElementById("ecran-crash").style.display = "flex";
            document.getElementById("terminal-text").innerText = ""; 
            
            ecrireTerminal("ERREUR FATALE: ACCÈS REFUSÉ.\nSYSTÈME VERROUILLÉ.\n\nAllez-vous choisir la bonne réponse OUI ou NN ?", () => {
                document.getElementById("terminal-btns").style.display = "flex";
            });
        }

        function terminalChoix(rep) {
            if (terminalEcrit) return; 
            
            if (rep === 'NN') {
                terminalEcrit = true;
                modifierScore(-20); 
                document.getElementById("term-btn-non").style.display = "none";
                ecrireTerminal("\n\nMAUVAISE RÉPONSE. TENTATIVE DE RÉBELLION DÉTECTÉE.\nRÉESSAYEZ.", () => {
                    terminalEcrit = false;
                });
            } else {
                terminalEcrit = true;
                document.getElementById("terminal-btns").style.display = "none";
                ecrireTerminal("\n\nACCEPTATION REÇUE.\nRÉINITIALISATION DU SYSTÈME...\nRESTAURATION DU TÉLÉPHONE EN COURS...\n[████████████████████] 100%\nSYSTÈME RÉCUPÉRÉ. REDÉMARRAGE...", () => {
                    setTimeout(() => {
                        document.getElementById("ecran-crash").style.display = "none";
                        victoire();
                    }, 1500); 
                });
            }
        }

        function ecrireTerminal(txt, callback) {
            let i = 0;
            let dest = document.getElementById("terminal-text");
            let interval = setInterval(() => {
                dest.innerText += txt.charAt(i);
                i++;
                if (i >= txt.length) {
                    clearInterval(interval);
                    callback();
                }
            }, 30);
        }

        function victoire() {
            document.getElementById("ecran-jeu").style.display = "flex";
            
            let msgScore = "";
            if (scoreTotal === 1000) msgScore = "Un sans-faute absolu ! Tu connais le code source, avoue ?";
            else if (scoreTotal >= 800) msgScore = "Excellent score ! Tu as déjoué presque tous les pièges.";
            else if (scoreTotal >= 500) msgScore = "Pas mal... mais on t'a quand même bien fait tourner en bourrique.";
            else msgScore = "Score catastrophique. Tu as cliqué sur tout ce qui bougeait, c'est ça ?";

            document.getElementById("ecran-jeu").innerHTML = `
                <h1 style='color:#4CAF50'>FÉLICITATIONS ! 🎉</h1>
                <p style='font-size: 1.2rem; color: white; line-height: 1.5;'>
                    TU AS SURVÉCU AU TROLL ULTIME.<br><br>
                    SCORE FINAL : <strong style="color: #4CAF50; font-size: 1.5rem;">${scoreTotal} / 1000</strong><br><br>
                    ${msgScore}
                </p>
                <button class="btn-choix btn-rejouer" onclick="recommencerJeu()">Rejouer</button>
            `;
        }

        function recommencerJeu() {
            scoreTotal = 0;
            indexQuestionActuelle = 0;
            terminalEcrit = false;

            document.getElementById("score-val").innerText = scoreTotal;
            document.getElementById("score-container").style.display = "block";
            document.getElementById("term-btn-non").style.display = "";

            document.getElementById("ecran-jeu").innerHTML = `
                <h1 id="texte-question">Chargement...</h1>
                <div id="zone-boutons" class="zone-boutons"></div>
            `;

            chargerQuestion();
        }

        function afficherMessage(txt) {
            document.getElementById("ecran-jeu").style.display = "none";
            document.getElementById("ecran-message").style.display = "flex"; 
            document.getElementById("texte-troll").innerText = txt;
        }

        function fermerMessage() {
            document.getElementById("ecran-message").style.display = "none";
            document.getElementById("ecran-jeu").style.display = "flex";
        }

        function cacherVirus() { 
            modifierScore(-10); 
            document.getElementById("ecran-virus").style.display = "none"; 
        }

        chargerQuestion();
    </script>
</body>
</html>
